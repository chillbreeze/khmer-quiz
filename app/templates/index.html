<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ខ្មែរ · Khmer Quiz</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Noto+Serif+Khmer:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="/static/css/style.css" />
    </head>
    <body>
        <div class="bg-texture"></div>

        <!-- Landing screen -->
        <div id="landing">
            <div class="landing-inner">
                <div class="landing-logo">
                    <span class="logo-km">សំណួរ​ភាសាខ្មែរ</span>
                    <span class="logo-en">KHMER QUIZ</span>
                </div>
                <p class="landing-desc">
                    Practice everyday Khmer vocabulary with multiple-choice
                    flashcards. 20 questions per session. English to Khmer
                    phonetics, Khmer phonetics to English, or mixed.
                </p>
                <button class="btn-start" id="btnStart">Start Quiz</button>
            </div>
            <footer>
                <span>Built by Terry</span>
                <span class="footer-sep">|</span>
                <a
                    href="https://github.com/chillbreeze/khmer-quiz"
                    target="_blank"
                    rel="noopener"
                >
                    <svg
                        width="14"
                        height="14"
                        viewBox="0 0 24 24"
                        fill="currentColor"
                    >
                        <path
                            d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"
                        />
                    </svg>
                    Github
                </a>
                <span class="footer-sep">|</span>
                <a
                    href="https://t.me/ProjectTerry"
                    target="_blank"
                    rel="noopener"
                >
                    <svg
                        width="14"
                        height="14"
                        viewBox="0 0 24 24"
                        fill="currentColor"
                    >
                        <path
                            d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L8.32 14.617l-2.96-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.828.942z"
                        />
                    </svg>
                    Message me
                </a>
            </footer>
        </div>

        <header class="hidden">
            <div class="logo" id="logoHome" style="cursor: pointer">
                <span class="logo-km">សំណួរភាសាខ្មែរ</span>
                <span class="logo-en">KHMER QUIZ</span>
            </div>
            <div class="controls-top">
                <div class="toggle-group" id="dirToggle">
                    <button class="tog active" data-val="random">Mixed</button>
                    <button class="tog" data-val="en_to_km">EN → KH</button>
                    <button class="tog" data-val="km_to_en">KH → EN</button>
                </div>
            </div>
        </header>

        <main class="hidden">
            <div class="score-bar">
                <span id="scoreTotal">0/20</span>
                <span class="score-sep">·</span>
                <span id="scoreCorrect">0</span>
                <span class="score-label">correct</span>
                <div class="streak" id="streak"></div>
            </div>

            <div class="card" id="card">
                <div class="card-dir-label" id="cardDir"></div>
                <div class="prompt" id="prompt">Loading…</div>

                <!-- Multiple choice mode -->
                <div class="choices" id="choicesWrap"></div>

                <div class="feedback hidden" id="feedback"></div>
                <button class="btn-next hidden" id="btnNext">Next →</button>
            </div>
        </main>

        <div class="results hidden" id="results">
            <div class="results-score" id="results-score"></div>
            <div class="results-pct" id="results-pct"></div>
            <div class="results-msg" id="results-msg"></div>
            <button class="btn-restart" id="btnRestart">Play Again</button>
        </div>

        <script src="/static/js/quiz.js"></script>
    </body>
</html>
