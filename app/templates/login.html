<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login · Khmer Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="/static/css/admin.css" />
</head>
<body class="admin-body">
  <div class="bg-texture"></div>

  <header>
    <div class="logo">
      <a href="/" class="logo-back">← Back</a>
      <span class="logo-en">ADMIN LOGIN</span>
    </div>
  </header>

  <main class="admin-main" style="display:flex;justify-content:center;align-items:flex-start;padding-top:4rem;">
    <div class="admin-add" style="max-width:360px;width:100%;">
      <h2>Login</h2>
      {% if error %}
      <p style="color:#c0392b;font-family:'Space Mono',monospace;font-size:0.85rem;margin-bottom:1rem;">{{ error }}</p>
      {% endif %}
      <form method="post" class="admin-form">
        <input type="text" name="username" placeholder="Username" autofocus required autocomplete="username" />
        <input type="password" name="password" placeholder="Password" required autocomplete="current-password" />
        <button type="submit">Login</button>
      </form>
    </div>
  </main>
</body>
</html>
